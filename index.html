<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Montique 山沁时 · 茶礼选品台</title>
  <meta name="description" content="Montique 山沁时茶礼选品台，按预算、场景和礼盒类型筛选 10 款精选茶礼。">
  <meta property="og:title" content="Montique 山沁时 · 茶礼选品台">
  <meta property="og:description" content="按预算、场景和礼盒类型筛选 10 款精选茶礼。">
  <meta property="og:image" content="https://zengheisenberg-bit.github.io/sanqingshi-product/assets/boxes/MTQ-001.jpg">
  <meta property="og:url" content="https://zengheisenberg-bit.github.io/sanqingshi-product/">
  <meta property="og:type" content="website">
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink: #1F2A2E;
      --mist: #F5F2EC;
      --sand: #E8E1D4;
      --amber: #B8895A;
      --pine: #3D4F3A;
      --text-1: #1F2A2E;
      --text-2: #6B6B6B;
      --text-3: #A0A0A0;
      --divider: #E5E0D6;
      --font: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      --fs-lg: 22px;
      --fs-md: 16px;
      --fs-sm: 14px;
      --fs-xs: 12px;
      --gap: 16px;
      --gap-sm: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--mist);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 16px;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--mist);
    }

    button {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 16px 12px;
      background: rgba(245, 242, 236, 0.96);
      border-bottom: 1px solid var(--divider);
      backdrop-filter: blur(10px);
    }

    .brand {
      margin: 0;
      color: var(--text-1);
      font-size: var(--fs-md);
      font-weight: 500;
      line-height: 1.35;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--text-2);
      font-size: var(--fs-sm);
      font-weight: 400;
    }

    .filters {
      display: grid;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--divider);
      background: var(--mist);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 6px 12px;
      color: var(--text-2);
      background: transparent;
      border: 1px solid var(--divider);
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 400;
      line-height: 1;
    }

    .chip.is-active {
      color: #fff;
      background: var(--pine);
      border-color: var(--pine);
    }

    .count-line {
      padding: 10px 16px 2px;
      color: var(--text-2);
      font-size: var(--fs-xs);
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: min(100%, 1080px);
      margin: 0 auto;
      padding: 12px 16px 24px;
    }

    .card {
      overflow: hidden;
      width: 100%;
      padding: 0;
      text-align: left;
      background: var(--sand);
      border: 1px solid var(--divider);
      border-radius: 8px;
      color: inherit;
    }

    .card-media {
      position: relative;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #f8f5ef;
    }

    .card-media img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-fallback {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18%;
      background:
        radial-gradient(circle at 50% 38%, rgba(184, 137, 90, 0.18), transparent 31%),
        linear-gradient(145deg, #f8f5ef 0%, #ece5d8 100%);
    }

    .image-fallback::before {
      content: "";
      width: min(58%, 190px);
      aspect-ratio: 1 / 0.78;
      border: 1px solid rgba(31, 42, 46, 0.2);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 48%, rgba(31, 42, 46, 0.13) 48%, rgba(31, 42, 46, 0.13) 52%, transparent 52%),
        linear-gradient(#3D4F3A 0 0) center 42% / 52% 1px no-repeat,
        linear-gradient(#B8895A 0 0) center 57% / 34% 1px no-repeat,
        #F5F2EC;
    }

    .card-media img.is-missing + .image-fallback,
    .drawer-media img.is-missing + .image-fallback {
      display: flex;
    }

    .card-media img.is-missing,
    .drawer-media img.is-missing {
      display: none;
    }

    .card-body {
      min-height: 35%;
      padding: 14px;
      background: var(--sand);
    }

    .card-title {
      margin: 0;
      color: var(--text-1);
      font-size: var(--fs-md);
      font-weight: 500;
      line-height: 1.35;
    }

    .price {
      margin: 6px 0 10px;
      color: var(--amber);
      font-size: 18px;
      font-weight: 500;
      line-height: 1.2;
    }

    .products {
      margin: 0 0 12px;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      max-width: 100%;
      padding: 4px 8px;
      color: var(--pine);
      border: 1px solid rgba(61, 79, 58, 0.25);
      border-radius: 999px;
      font-size: var(--fs-xs);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .empty {
      margin: 18px 16px;
      padding: 20px;
      color: var(--text-2);
      border: 1px solid var(--divider);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.35);
      font-size: var(--fs-sm);
      line-height: 1.6;
    }

    .footer {
      margin-top: auto;
      padding: 18px 16px 24px;
      border-top: 1px solid var(--divider);
      color: var(--text-2);
      font-size: var(--fs-xs);
      line-height: 1.6;
    }

    .footer a {
      display: inline-flex;
      margin-top: 8px;
      color: var(--text-1);
      text-decoration: none;
      font-size: var(--fs-sm);
      font-weight: 500;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(31, 42, 46, 0.24);
    }

    .overlay.is-open {
      display: block;
    }

    .drawer {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      flex-direction: column;
      background: var(--mist);
      color: var(--text-1);
    }

    .drawer.is-open {
      display: flex;
    }

    .drawer-head {
      display: flex;
      justify-content: flex-end;
      padding: 10px 12px;
      border-bottom: 1px solid var(--divider);
      background: var(--mist);
    }

    .icon-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      color: var(--text-1);
      background: transparent;
      border: 1px solid var(--divider);
      border-radius: 999px;
      font-size: 22px;
      line-height: 1;
    }

    .drawer-scroll {
      overflow-y: auto;
      padding-bottom: 92px;
    }

    .drawer-media {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f8f5ef;
      border-bottom: 1px solid var(--divider);
    }

    .drawer-media img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .dots {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 12px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(31, 42, 46, 0.25);
      border: 0;
      padding: 0;
    }

    .dot.is-active {
      background: var(--pine);
    }

    .drawer-body {
      padding: 18px 16px 24px;
    }

    .drawer-title {
      margin: 0;
      font-size: var(--fs-lg);
      font-weight: 500;
      line-height: 1.35;
    }

    .section {
      margin-top: 20px;
    }

    .section h3 {
      margin: 0 0 8px;
      color: var(--text-1);
      font-size: var(--fs-md);
      font-weight: 500;
      line-height: 1.35;
    }

    .section p,
    .section li {
      color: var(--text-2);
      font-size: var(--fs-sm);
      font-weight: 400;
      line-height: 1.65;
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
    }

    .drawer-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 45;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(245, 242, 236, 0.96);
      border-top: 1px solid var(--divider);
      backdrop-filter: blur(10px);
    }

    .action {
      min-height: 44px;
      border-radius: 8px;
      border: 1px solid var(--ink);
      font-size: var(--fs-sm);
      font-weight: 500;
    }

    .action.primary {
      color: #fff;
      background: var(--ink);
    }

    .action.secondary {
      color: var(--ink);
      background: transparent;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 76px;
      z-index: 60;
      display: none;
      transform: translateX(-50%);
      padding: 9px 12px;
      color: #fff;
      background: var(--ink);
      border-radius: 999px;
      font-size: var(--fs-xs);
    }

    .toast.is-visible {
      display: block;
    }

    @media (min-width: 768px) {
      .topbar {
        padding-left: 28px;
        padding-right: 28px;
      }

      .filters {
        padding-left: 28px;
        padding-right: 28px;
      }

      .count-line {
        width: min(100%, 1080px);
        margin: 0 auto;
        padding-left: 28px;
        padding-right: 28px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding-left: 28px;
        padding-right: 28px;
      }

      .drawer {
        inset: 0 0 0 auto;
        width: min(440px, 42vw);
        border-left: 1px solid var(--divider);
      }

      .drawer-actions {
        left: auto;
        width: min(440px, 42vw);
      }
    }

    @media (min-width: 1040px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <h1 class="brand">Montique · 山沁时</h1>
      <p class="subtitle">茶礼选品台</p>
    </header>

    <main>
      <section class="filters" id="filters" aria-label="筛选礼盒"></section>
      <div class="count-line" id="countLine">正在加载礼盒...</div>
      <section class="grid" id="grid" aria-live="polite"></section>
    </main>

    <footer class="footer">
      Montique · 山沁时 · 带茶去旷野
      <br>
      <a href="./advisor.html">联系顾问 →</a>
    </footer>
  </div>

  <div class="overlay" id="overlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true" aria-label="礼盒详情">
    <div class="drawer-head">
      <button class="icon-button" id="closeDrawer" type="button" aria-label="关闭详情">×</button>
    </div>
    <div class="drawer-scroll" id="drawerContent"></div>
    <div class="drawer-actions">
      <button class="action primary" id="wechatButton" type="button">加微信咨询</button>
      <button class="action secondary" id="copyButton" type="button">复制详情</button>
    </div>
  </aside>
  <div class="toast" id="toast">已复制</div>

  <script>
    const ADVISOR_WECHAT = 'shanqinshi_li';
    const filterGroups = {
      box_type: ['全部', '单罐', '双罐', '四罐', '茶饼盒', '提袋装'],
      budget_tier: ['全部', '<200', '200-500', '500-1000', '1000+'],
      scene_tags: ['全部', '商务答谢', '送长辈', '送闺蜜', '团建', '收藏馈赠']
    };
    const state = {
      allItems: [],
      filters: { box_type: '全部', budget_tier: '全部', scene_tags: '全部' },
      selected: null,
      slide: 0
    };

    const filtersEl = document.getElementById('filters');
    const gridEl = document.getElementById('grid');
    const countLineEl = document.getElementById('countLine');
    const drawerEl = document.getElementById('drawer');
    const overlayEl = document.getElementById('overlay');
    const drawerContentEl = document.getElementById('drawerContent');
    const toastEl = document.getElementById('toast');

    function money(value) {
      return `¥${Number(value).toLocaleString('zh-CN')} 起`;
    }

    function makeImage(src, alt, isPriority = false) {
      const loading = isPriority ? 'eager' : 'lazy';
      const priority = isPriority ? ' fetchpriority="high"' : '';
      return `
        <img src="${src}" alt="${alt}" loading="${loading}" decoding="async"${priority} onerror="this.classList.add('is-missing'); this.removeAttribute('src');">
        <span class="image-fallback" aria-hidden="true"></span>
      `;
    }

    function safeTags(item) {
      const tags = [item.box_type, item.budget_tier, ...item.scene_tags];
      if (item.customization_summary.includes('Logo')) tags.push('可定制Logo');
      if (item.customization_summary.includes('刻字')) tags.push('可刻字');
      return [...new Set(tags.filter(Boolean))];
    }

    function filteredItems() {
      return state.allItems.filter((item) => {
        const boxMatch = state.filters.box_type === '全部' || item.box_type === state.filters.box_type;
        const budgetMatch = state.filters.budget_tier === '全部' || item.budget_tier === state.filters.budget_tier;
        const sceneMatch = state.filters.scene_tags === '全部' || item.scene_tags.includes(state.filters.scene_tags);
        return boxMatch && budgetMatch && sceneMatch;
      });
    }

    function renderFilters() {
      filtersEl.innerHTML = Object.entries(filterGroups).map(([group, values]) => `
        <div class="chip-row" role="group" aria-label="${group}">
          ${values.map((value) => `
            <button
              class="chip ${state.filters[group] === value ? 'is-active' : ''}"
              type="button"
              data-filter-group="${group}"
              data-filter-value="${value}"
            >${value}</button>
          `).join('')}
        </div>
      `).join('');
    }

    function renderCards() {
      const items = filteredItems();
      countLineEl.textContent = `共 ${state.allItems.length} 款 · 已筛选 ${items.length} 款`;
      if (!items.length) {
        gridEl.innerHTML = '<div class="empty">当前筛选下没有匹配礼盒。</div>';
        return;
      }
      gridEl.innerHTML = items.map((item, index) => `
        <button class="card" type="button" data-item-id="${item.id}" aria-label="查看 ${item.name}">
          <div class="card-media">${makeImage(item.cover_image, item.name, index < 3)}</div>
          <div class="card-body">
            <h2 class="card-title">${item.name}</h2>
            <div class="price">${money(item.price_retail)}</div>
            <p class="products">${item.products_included}</p>
            <div class="tags">
              ${safeTags(item).slice(0, 5).map((tag) => `<span class="tag">${tag}</span>`).join('')}
            </div>
          </div>
        </button>
      `).join('');
    }

    function renderAll() {
      renderFilters();
      renderCards();
    }

    function openDrawer(item) {
      state.selected = item;
      state.slide = 0;
      renderDrawer();
      drawerEl.classList.add('is-open');
      overlayEl.classList.add('is-open');
      drawerEl.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      drawerEl.classList.remove('is-open');
      overlayEl.classList.remove('is-open');
      drawerEl.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function renderDrawer() {
      const item = state.selected;
      if (!item) return;
      const slides = [item.cover_image, item.logo_zone_image, ...(item.gallery || [])]
        .filter(Boolean)
        .filter((src, index, arr) => arr.indexOf(src) === index);
      const activeSrc = slides[state.slide] || item.cover_image;
      drawerContentEl.innerHTML = `
        <div class="drawer-media">
          ${makeImage(activeSrc, item.name, true)}
          <div class="dots" aria-label="图片轮播">
            ${slides.map((_, index) => `
              <button class="dot ${index === state.slide ? 'is-active' : ''}" type="button" data-slide="${index}" aria-label="第 ${index + 1} 张图"></button>
            `).join('')}
          </div>
        </div>
        <div class="drawer-body">
          <h2 class="drawer-title">${item.name}</h2>
          <div class="price">${money(item.price_retail)}</div>
          <div class="tags">${safeTags(item).map((tag) => `<span class="tag">${tag}</span>`).join('')}</div>

          <section class="section">
            <h3>礼盒含</h3>
            <p>${item.products_included}</p>
          </section>

          <section class="section">
            <h3>卖点</h3>
            <ul>${item.key_selling_points.map((point) => `<li>${point}</li>`).join('')}</ul>
          </section>

          <section class="section">
            <h3>定制服务</h3>
            <p>${item.customization_summary}</p>
          </section>

          ${item.is_tea_cake ? `
            <section class="section">
              <h3>茶饼说明</h3>
              <p>${item.tea_cake_note}</p>
            </section>
          ` : ''}
        </div>
      `;
    }

    async function copyDetails() {
      const item = state.selected;
      if (!item) return;
      const details = [
        item.name,
        money(item.price_retail),
        item.products_included,
        item.customization_summary,
        item.key_selling_points.join(' / ')
      ].join('\n');
      try {
        await navigator.clipboard.writeText(details);
        showToast('已复制详情');
      } catch (error) {
        showToast('请手动复制详情');
      }
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('is-visible');
      window.setTimeout(() => toastEl.classList.remove('is-visible'), 1600);
    }

    filtersEl.addEventListener('click', (event) => {
      const button = event.target.closest('[data-filter-group]');
      if (!button) return;
      state.filters[button.dataset.filterGroup] = button.dataset.filterValue;
      renderAll();
    });

    gridEl.addEventListener('click', (event) => {
      const card = event.target.closest('[data-item-id]');
      if (!card) return;
      const item = state.allItems.find((entry) => entry.id === card.dataset.itemId);
      if (item) openDrawer(item);
    });

    drawerContentEl.addEventListener('click', (event) => {
      const dot = event.target.closest('[data-slide]');
      if (!dot) return;
      state.slide = Number(dot.dataset.slide);
      renderDrawer();
    });

    document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
    overlayEl.addEventListener('click', closeDrawer);
    document.getElementById('copyButton').addEventListener('click', copyDetails);
    document.getElementById('wechatButton').addEventListener('click', () => {
      showToast(`微信号：${ADVISOR_WECHAT}`);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeDrawer();
    });

    fetch('./data.json')
      .then((response) => {
        if (!response.ok) throw new Error('data load failed');
        return response.json();
      })
      .then((data) => {
        state.allItems = data.filter((item) => item.status === 'active');
        renderAll();
      })
      .catch(() => {
        countLineEl.textContent = '数据加载失败';
        gridEl.innerHTML = '<div class="empty">请确认 data.json 与 index.html 在同一目录，并使用本地服务器打开。</div>';
      });
  </script>
</body>
</html>
